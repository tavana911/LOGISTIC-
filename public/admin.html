<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAUPEMAGE LOGISTICS - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <script>
      (function() {
        const PAUPEMAGE_KEY = "TheBoss@paupemage1"; 
        if (sessionStorage.getItem("adminAllowed") !== "true") {
          const password = prompt("Paupemage Admin: Enter Security Key");
          if (password === PAUPEMAGE_KEY) {
            sessionStorage.setItem("adminAllowed", "true");
          } else {
            alert("Access Denied.");
            window.location.href = "index.html";
          }
        }
      })();
    </script>

    <div class="max-w-4xl mx-auto py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-800">PAUPEMAGE LOGISTICS</h1>
            <p class="text-gray-600 font-semibold">Admin Dashboard</p>
        </header>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-600">
                <h2 class="text-xl font-bold mb-4">Create Shipment</h2>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="trackNum" readonly placeholder="Click Generate" class="bg-gray-50 border p-2 flex-grow rounded">
                        <button onclick="generateID()" class="bg-gray-700 text-white px-3 py-2 rounded text-sm">Generate</button>
                    </div>
                    <input type="text" id="sender" placeholder="Sender Name" class="border p-2 w-full rounded">
                    <input type="text" id="receiver" placeholder="Receiver Name" class="border p-2 w-full rounded">
<input type="text" id="dest" placeholder="Destination" class="border p-2 w-full rounded">
                    <textarea id="adminNote" placeholder="Admin Note (optional)" class="border p-2 w-full rounded" rows="3"></textarea>
                    <button onclick="saveShipment()" class="w-full bg-green-600 text-white py-3 rounded font-bold">Register Package</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-orange-500">
                <h2 class="text-xl font-bold mb-4">Update Status</h2>
                <div class="space-y-3">
                    <input type="text" id="upTrack" placeholder="Tracking Number (PM-...)" class="border p-2 w-full rounded">
                    <select id="upStatus" class="border p-2 w-full rounded">
                        <option value="Picked Up">Picked Up</option>
                        <option value="In Transit">In Transit</option>
                        <option value="Out for Delivery">Out for Delivery</option>
<option value="Delivered">Delivered</option>
                        <option value="On Hold">On Hold</option>
                    </select>
                    <input type="text" id="upLoc" placeholder="Current Location" class="border p-2 w-full rounded">
                    <button onclick="updateStatus()" class="w-full bg-orange-600 text-white py-3 rounded font-bold">Push Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONFIG
        const supabaseUrl = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
        const supabaseKey = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function generateID() {
            const id = "PM-" + Math.floor(100000 + Math.random() * 900000);
            document.getElementById('trackNum').value = id;
        }

async function saveShipment() {
            try {
                const trackingIdRaw = document.getElementById('trackNum').value.toUpperCase();
                const sender = document.getElementById('sender').value;
                const status = 'Picked Up';
                const location = document.getElementById('dest').value;
                const deliveryDate = '';
                const adminNote = document.getElementById('adminNote').value || '';

                if (!trackingIdRaw || !sender) {
                    alert('Please fill tracking ID and sender.');
                    return;
                }

                const { error } = await _supabase
                    .from('shipments')
                    .upsert([{
                        tracking_id: trackingIdRaw,
                        status,
                        location,
                        sender,
                        delivery_date: deliveryDate,
                        admin_note: adminNote
                    }], { onConflict: 'tracking_id' });

                if (error) {
                    console.error('Supabase error:', error);
                    alert('Failed to save: ' + error.message);
                } else {
                    console.log('Shipment saved successfully:', trackingIdRaw);
                    alert(`Success! Shipment ${trackingIdRaw} is live.`);
                    window.location.reload();
                }
            } catch (err) {
                console.error('Unexpected error:', err);
                alert('An unexpected error occurred. Check console.');
            }
        }

        async function updateStatus() {
            try {
                const trackingId = document.getElementById('upTrack').value.toUpperCase().trim();
                const status = document.getElementById('upStatus').value;
                const location = document.getElementById('upLoc').value.trim();

                if (!trackingId || !status || !location) {
                    alert('Please fill all fields.');
                    return;
                }

                // 1. Check if shipment exists in shipments table
                const { data: existing, error: checkError } = await _supabase
                    .from('shipments')
                    .select('id')
                    .eq('tracking_id', trackingId)
                    .maybeSingle();

                if (checkError) {
                    console.error('Check error:', checkError);
                    throw new Error('Failed to check shipment.');
                }

                let shipmentId;
                if (!existing) {
                    // 2. Create new shipment
                    const { data: newShipment, error: createError } = await _supabase
                        .from('shipments')
                        .insert([{
                            tracking_id: trackingId,
                            status: status,
                            location: location,
                            sender: 'Paupemage Logistics',
                            delivery_date: 'Pending'
                        }])
                        .select('id')
                        .single();

                    if (createError || !newShipment) {
                        console.error('Create error:', createError);
                        throw new Error('Failed to create new shipment.');
                    }
                    shipmentId = newShipment.id;
                    console.log('Created new shipment:', trackingId);
                } else {
                    // 3. Update existing
                    const { error: updateError } = await _supabase
                        .from('shipments')
                        .update({ 
                            status: status, 
                            location: location 
                        })
                        .eq('id', existing.id);

                    if (updateError) {
                        console.error('Update error:', updateError);
                        throw new Error('Failed to update shipment.');
                    }
                    shipmentId = existing.id;
                    console.log('Updated shipment:', trackingId);
                }

                // 4. Log the update
                const { error: logError } = await _supabase
                    .from('logs')
                    .insert([{
                        shipment_id: shipmentId,
                        status: status,
                        location: location
                    }]);

                if (logError) {
                    console.error('Log error:', logError);
                }

                console.log(`Status updated and logged for ${trackingId}`);
                alert(`Success! ${trackingId} updated to "${status}" at ${location}.`);
                window.location.reload();
            } catch (err) {
                console.error('UpdateStatus error:', err);
                alert(`Error: ${err.message}. Check console for details.`);
            }
        }
    </script>
</body>
</html>
