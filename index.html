<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAUPEMAGE LOGISTICS - Track</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">PAUPEMAGE LOGISTICS</h1>
            <div class="space-x-4 text-sm">
                <a href="/" class="hover:underline">Home</a>
                <a href="/admin.html" class="opacity-50">Admin</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-md mb-8 text-center border-b-4 border-blue-600">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Track Your Shipment</h2>
            <div class="flex gap-2 max-w-md mx-auto">
                <input type="text" id="trackID" placeholder="Enter Tracking Number (PM-...)" 
                       class="flex-grow border-2 border-gray-200 p-3 rounded-lg focus:border-blue-500 outline-none">
                <button onclick="trackShipment()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                    TRACK
                </button>
            </div>
        </div>

        <div id="results" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-xs text-gray-400 font-bold uppercase">Tracking ID</p>
                        <h3 id="resID" class="text-xl font-black text-blue-900">---</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-bold uppercase">Status</p>
                        <span id="resStatus" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold italic">---</span>
                    </div>
                </div>

                <div class="relative pt-4 pb-8">
                    <div class="absolute top-6 left-0 w-full h-1 bg-gray-100 rounded"></div>
                    <div id="progressBar" class="absolute top-6 left-0 h-1 bg-blue-600 rounded transition-all duration-1000" style="width: 0%"></div>
                    <div class="relative flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                        <div class="flex flex-col items-center"><div class="w-4 h-4 bg-blue-600 rounded-full border-4 border-white mb-2 shadow"></div>Picked Up</div>
                        <div class="flex flex-col items-center"><div id="dotTransit" class="w-4 h-4 bg-gray-200 rounded-full border-4 border-white mb-2 shadow"></div>In Transit</div>
                        <div class="flex flex-col items-center"><div id="dotDelivered" class="w-4 h-4 bg-gray-200 rounded-full border-4 border-white mb-2 shadow"></div>Delivered</div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2">📦 Journey History</h4>
                <div id="logContainer" class="space-y-4 border-l-2 border-blue-50 ml-2">
                    </div>
            </div>

            <div class="text-center p-4 bg-green-50 rounded-xl border border-green-100">
                <p class="text-xs text-green-700 font-medium mb-2">Need help with this shipment?</p>
                <a href="https://wa.me/YOUR_NUMBER" class="text-green-600 font-bold hover:underline">Chat with Paupemage Support</a>
            </div>
        </div>

        <div id="errorMsg" class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-center font-bold border border-red-100">
            Package not found. Please check the ID.
        </div>
    </main>

    <script>
        const url = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
        const key = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
        const _supabase = supabase.createClient(url, key);

        async function trackShipment() {
            const id = document.getElementById('trackID').value.trim();
            const results = document.getElementById('results');
            const error = document.getElementById('errorMsg');
            const logContainer = document.getElementById('logContainer');

            if(!id) return;

            // Reset
            results.classList.add('hidden');
            error.classList.add('hidden');
            logContainer.innerHTML = '';

            const { data, error: dbError } = await _supabase
                .from('shipment')
                .select('*, logs(*)')
                .eq('tracking_number', id)
                .single();

            if (dbError || !data) {
                error.classList.remove('hidden');
                return;
            }

            // Show Results
            results.classList.remove('hidden');
            document.getElementById('resID').innerText = data.tracking_number;
            document.getElementById('resStatus').innerText = data.current_status;

            // Progress Bar Logic
            let progress = "5%";
            const status = data.current_status.toLowerCase();
            if(status.includes("transit")) { 
                progress = "50%"; 
                document.getElementById('dotTransit').classList.replace('bg-gray-200', 'bg-blue-600');
            }
            if(status.includes("deliver")) { 
                progress = "100%"; 
                document.getElementById('dotTransit').classList.replace('bg-gray-200', 'bg-blue-600');
                document.getElementById('dotDelivered').classList.replace('bg-gray-200', 'bg-green-500');
            }
            document.getElementById('progressBar').style.width = progress;

            // Logs Logic
            const sortedLogs = data.logs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            sortedLogs.forEach(log => {
                const date = new Date(log.created_at).toLocaleDateString('en-GB', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
                logContainer.innerHTML += `
                    <div class="relative pl-6 pb-2">
                        <div class="absolute -left-[9px] top-1 w-4 h-4 bg-blue-600 border-4 border-white rounded-full"></div>
                        <div class="bg-gray-50 p-3 rounded-lg">
                            <div class="flex justify-between">
                                <span class="font-bold text-gray-800 text-sm">${log.status_update}</span>
                                <span class="text-[10px] text-gray-400">${date}</span>
                            </div>
                            <p class="text-xs text-gray-500 font-medium mt-1">📍 ${log.location}</p>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
