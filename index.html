<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAUPEMAGE LOGISTICS</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      #results { width: 100%; max-width: 600px; margin: 20px auto; font-family: 'Segoe UI', sans-serif; position: relative; z-index: 9999; }
      .status-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 8px solid #007bff; margin-bottom: 20px; }
      .journey-log { border-left: 2px solid #007bff; padding-left: 20px; margin: 15px 0; position: relative; }
      .journey-dot { position: absolute; left: -7px; top: 5px; width: 12px; height: 12px; background: #007bff; border-radius: 50%; border: 2px solid white; }
    </style>
  </head>

  <body>
    <div id="results"></div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
      const url = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
      const key = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
      const _paupemage = supabase.createClient(url, key);

      async function trackShipment(manualNum = null) {
        const resultsDiv = document.getElementById('results');
        
        let num = manualNum;
        if (!num) {
          const allInputs = document.querySelectorAll('input');
          for (let i of allInputs) {
            if (i.value.trim().length > 2) { 
              num = i.value.trim();
              break;
            }
          }
        }

        if (!num) return;
        resultsDiv.innerHTML = `<div style="text-align:center; padding:30px; background:white; border-radius:12px;">Searching...</div>`;

        // STEP 1: Get the shipment details ONLY (No logs here)
        const { data: shipment, error: sError } = await _paupemage
          .from('shipment') 
          .select('*') 
          .eq('tracking_number', num)
          .maybeSingle();

        if (sError) {
          resultsDiv.innerHTML = `<div class="status-card" style="border-top-color:red;">Error: ${sError.message}</div>`;
          return;
        }

        if (!shipment) {
          resultsDiv.innerHTML = `<div class="status-card" style="border-top-color:orange;">ID <b>${num}</b> not found.</div>`;
          return;
        }

        // STEP 2: Get the logs separately using the shipment's ID
        // This avoids the "Multiple Relationships" error completely!
        const { data: logs, error: lError } = await _paupemage
          .from('logs')
          .select('*')
          .eq('shipment_id', shipment.id);

        const sortedLogs = logs ? logs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)) : [];

        // STEP 3: Display everything
        resultsDiv.innerHTML = `
          <div class="status-card">
            <h2 style="margin:0; color:#333;">${shipment.tracking_number}</h2>
            <p><b>Current Status:</b> <span style="color:#007bff; font-weight:bold;">${shipment.current_status}</span></p>
            <p><b>Destination:</b> ${shipment.destination}</p>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <h4>Journey History</h4>
            ${sortedLogs.length > 0 ? sortedLogs.map(l => `
              <div class="journey-log">
                <div class="journey-dot"></div>
                <b>${l.status_update}</b><br>
                <small>${l.location} | ${new Date(l.created_at).toLocaleString()}</small>
              </div>
            `).join('') : '<p style="color:#999;">No history logs found for this package yet.</p>'}
            <div id="map" style="height:200px; border-radius:12px; margin-top:20px; border:1px solid #eee;"></div>
          </div>
        `;
        
        resultsDiv.scrollIntoView({ behavior: 'smooth' });

        setTimeout(() => {
            const map = L.map('map').setView([6.5244, 3.3792], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }, 300);
      }

      window.trackShipment = trackShipment;

      document.addEventListener('click', (e) => {
        if (e.target.innerText && e.target.innerText.toUpperCase().includes('TRACK')) {
          setTimeout(() => trackShipment(), 200);
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
