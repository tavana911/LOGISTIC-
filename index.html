<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAUPEMAGE LOGISTICS</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root { --primary: #007bff; --bg: #f8fafc; --text: #1e293b; }
      #results { width: 95%; max-width: 650px; margin: 40px auto; font-family: 'Segoe UI', system-ui, sans-serif; position: relative; z-index: 9999; }
      
      .status-card { 
        background: white; padding: 30px; border-radius: 24px; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); 
        margin-bottom: 30px; animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

      .progress-container { margin: 30px 0; background: #e2e8f0; height: 12px; border-radius: 10px; overflow: hidden; }
      .progress-bar { 
        background: linear-gradient(90deg, #007bff, #00d2ff); height: 100%; width: 0%; 
        transition: width 1.5s cubic-bezier(0.1, 0, 0.3, 1); 
      }

      .journey-log { border-left: 2px solid #e2e8f0; padding-left: 25px; margin: 25px 0; position: relative; }
      .journey-dot { 
        position: absolute; left: -7px; top: 4px; width: 12px; height: 12px; 
        background: var(--primary); border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 2px var(--primary);
      }
      
      .info-row { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 15px; }
      .label { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
      .value { display: block; font-size: 16px; color: var(--text); font-weight: 600; }
      
      h4 { margin-top: 35px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; color: var(--text); font-size: 18px; }
      .log-time { color: #64748b; font-size: 12px; margin-top: 4px; display: block; }
      .location-tag { background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
    </style>
  </head>

  <body>
    <div id="results"></div>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
      const url = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
      const key = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
      const _paupemage = supabase.createClient(url, key);

      function calculateProgress(status) {
        const s = (status || "").toLowerCase();
        if (s.includes('delivered')) return 100;
        if (s.includes('transit') || s.includes('moving')) return 65;
        if (s.includes('picked') || s.includes('received')) return 35;
        if (s.includes('hub') || s.includes('sorting')) return 80;
        return 15;
      }

      async function trackShipment(manualNum = null) {
        const resultsDiv = document.getElementById('results');
        let num = (manualNum || '').toUpperCase().trim();
        if (!num) {
          const allInputs = document.querySelectorAll('input');
          for (let i of allInputs) {
            const val = i.value.trim();
            if (val.length > 2) { num = val.toUpperCase(); break; }
          }
        }
        if (!num) return;

        resultsDiv.innerHTML = `<div style="text-align:center; padding:50px; background:white; border-radius:20px;">📡 Fetching the latest updates...</div>`;
        resultsDiv.scrollIntoView({ behavior: 'smooth' });

        // 1. Get Shipment (case-insensitive via upper)
        const { data: shipment, error: sError } = await _paupemage
          .from('shipments').select('*').eq('tracking_id', num).maybeSingle();

        if (sError || !shipment) {
          alert(`No shipment found for ${num}. Please check the ID and try again.`);
          return;
        }

        // 2. Get Logs (Strict Order: Newest First)
        const { data: logs } = await _paupemage
          .from('logs')
          .select('*')
          .eq('shipment_id', shipment.id)
          .order('created_at', { ascending: false }); // THIS FIXES THE LOG ORDER

        const progressPercent = calculateProgress(shipment.status);

        resultsDiv.innerHTML = `
          <div class="status-card">
<div class="info-row">
                <div class="data-box">
<span class="label">ID Number</span>
                    <span class="value" style="color:var(--primary); font-size: 24px;">${shipment.tracking_id}</span>
                </div>
                <div style="text-align:right;">
                    <span class="label">Sender</span>
                    <span class="value">${shipment.sender || 'N/A'}</span>
                </div>
            </div>

<div class="progress-container">
                <div class="progress-bar" id="p-bar" style="width: 0%"></div>
            </div>

            <div class="info-row">
                <div>
                    <span class="label">Delivery Date</span>
                    <span class="value">${shipment.delivery_date || 'TBD'}</span>
                </div>
                <div style="text-align:right;">
                    <span class="label">Admin Notice</span>
                    <span class="value">${shipment.admin_notice || 'None'}</span>
                </div>
            </div>

            <div class="info-row">
                <div class="data-box">
                    <span class="label">Current Location</span>
                    <span class="value">${shipment.location || 'N/A'}</span>
                </div>
                <div style="text-align:right;">
                    <span class="label">Network</span>
                    <span class="value">Paupemage Logistics</span>
                </div>
            </div>

            <h4>Journey History</h4>
            <div style="max-height: 450px; overflow-y: auto; padding-right: 15px;">
                ${logs && logs.length > 0 ? logs.map(l => `
                <div class="journey-log">
                    <div class="journey-dot"></div>
                    <div class="location-tag">${l.location.toUpperCase()}</div><br>
                    <b style="color:var(--text); font-size:15px;">${l.status}</b>
                    <span class="log-time">${new Date(l.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
                </div>
                `).join('') : '<p style="color:#94a3b8; text-align:center;">Registering package details...</p>'}
            </div>

            <div id="map" style="height:250px; border-radius:18px; margin-top:30px; border:1px solid #e2e8f0;"></div>
          </div>
        `;
        
        // Progress animation
        setTimeout(() => { 
          const bar = document.getElementById('p-bar');
          if(bar) bar.style.width = progressPercent + '%';
        }, 150);

        // Map setup
        setTimeout(() => {
            const map = L.map('map').setView([6.5244, 3.3792], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }, 400);
      }

      window.trackShipment = trackShipment;
      
      // Listener for React Button
      document.addEventListener('click', (e) => {
        if (e.target.innerText && e.target.innerText.toUpperCase().includes('TRACK')) {
          setTimeout(() => trackShipment(), 200);
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
