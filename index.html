<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAUPEMAGE LOGISTICS</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      #results:empty { display: none; }
      .journey-item { margin-bottom: 15px; position: relative; padding-left: 20px; border-left: 2px solid #007bff; }
      .journey-dot { position: absolute; left: -6px; top: 5px; width: 10px; height: 10px; background: #007bff; border-radius: 50%; }
    </style>
  </head>

  <body>
    <div id="results" style="max-width: 800px; margin: 20px auto; font-family: sans-serif; padding: 0 15px;"></div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
      const url = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
      const key = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
      const paupemageDB = supabase.createClient(url, key);

      async function trackShipment(trackingNumber) {
        const resultsDiv = document.getElementById('results');
        
        // If trackingNumber wasn't passed, try to find it in the input box
        if (!trackingNumber) {
          const input = document.querySelector('input');
          trackingNumber = input ? input.value.trim() : "";
        }

        if (!trackingNumber) return;

        resultsDiv.innerHTML = `<div style="text-align:center; padding: 20px; background: #f8f9fa; border-radius: 8px;">Searching for <b>${trackingNumber}</b>...</div>`;
        resultsDiv.scrollIntoView({ behavior: 'smooth' });

        const { data: shipment, error: shipError } = await paupemageDB
          .from('shipment')
          .select('*, logs(*)')
          .eq('tracking_number', trackingNumber)
          .maybeSingle();

        if (shipError || !shipment) {
          resultsDiv.innerHTML = `<div style="color:red; text-align:center; padding: 20px; background: #fff1f1; border-radius: 8px; border: 1px solid red;">⚠️ Package <b>${trackingNumber}</b> not found. Please check the ID.</div>`;
          return;
        }

        // BUILD DISPLAY
        let html = `
          <div style="background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid #007bff; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0; color: #333;">Package ID: ${shipment.tracking_number}</h3>
                <span style="background: #e7f3ff; color: #007bff; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px;">${shipment.current_status.toUpperCase()}</span>
            </div>
            <p style="color: #666; margin-bottom: 20px;"><b>Destination:</b> ${shipment.destination}</p>
            
            <h4 style="border-bottom: 1px solid #eee; padding-bottom: 10px;">Travel History</h4>
            <div id="log-list" style="margin-top: 15px;">
        `;

        if (shipment.logs && shipment.logs.length > 0) {
            const sortedLogs = shipment.logs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
            sortedLogs.forEach(log => {
                html += `
                  <div class="journey-item">
                    <div class="journey-dot"></div>
                    <b style="color: #333;">${log.status_update}</b><br>
                    <small style="color: #888;">${log.location} — ${new Date(log.created_at).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</small>
                  </div>
                `;
            });
        } else {
            html += "<p style='color: #999; font-style: italic;'>Package information received. Pending further updates...</p>";
        }

        html += `</div>
                 <div id="tracking-map" style="height: 250px; border-radius: 10px; margin-top: 20px; border: 1px solid #ddd;"></div>
                 <div style="text-align: center; margin-top: 20px;">
                    <a href="https://wa.me/yournumber" style="color: #25D366; text-decoration: none; font-weight: bold; font-size: 14px;">💬 Need Help? Contact Support</a>
                 </div>
                 </div>`;
        
        resultsDiv.innerHTML = html;

        // Init Map
        setTimeout(() => {
          const map = L.map('tracking-map').setView([6.5244, 3.3792], 4);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }, 100);
      }

      // GLOBAL ACCESS
      window.trackShipment = trackShipment;

      // THE AUTO-FIX: This force-connects your React button to the code
      document.addEventListener('click', function(e) {
        if (e.target && (e.target.innerText === 'Track' || e.target.innerText === 'TRACK')) {
          trackShipment();
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
