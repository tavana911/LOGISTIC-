<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PAUPEMAGE LOGISTICS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      #results { width: 100%; max-width: 600px; margin: 10px auto; font-family: sans-serif; z-index: 9999; position: relative; }
      .status-card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 20px rgba(0,0,0,0.15); border-top: 6px solid #007bff; margin: 10px; }
      .log-item { border-left: 2px solid #007bff; padding-left: 15px; margin: 15px 0; position: relative; }
      .log-dot { position: absolute; left: -6px; top: 5px; width: 10px; height: 10px; background: #007bff; border-radius: 50%; }
    </style>
  </head>

  <body>
    <div id="results"></div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
      const url = 'https://irkglfbrmiuydjmzgjuv.supabase.co';
      const key = 'sb_publishable_QUI7elFmVBaHTmw-kAgtVw_7aJKpxq0';
      const _paupemage = supabase.createClient(url, key);

      async function trackShipment(manualNum = null) {
        const resultsDiv = document.getElementById('results');
        
        // 1. Find the number (from argument, or search all inputs)
        let num = manualNum;
        if (!num) {
          const allInputs = document.querySelectorAll('input');
          for (let i of allInputs) {
            if (i.value.trim().toUpperCase().startsWith('PM')) {
              num = i.value.trim();
              break;
            }
          }
          if (!num && allInputs.length > 0) num = allInputs[0].value.trim();
        }

        if (!num) return;

        resultsDiv.innerHTML = `<div style="text-align:center;background:#eee;padding:10px;border-radius:8px;">Searching Database for: ${num}...</div>`;

        // 2. The Database Call
        // NOTE: If this fails, check if your table is named 'shipment' or 'shipments'
        const { data, error } = await _paupemage
          .from('shipment') 
          .select('*, logs(*)')
          .eq('tracking_number', num)
          .maybeSingle();

        if (error) {
          console.error("Supabase Error:", error);
          resultsDiv.innerHTML = `<div class="status-card" style="border-top-color:red;">Database Error. Please try again later.</div>`;
          return;
        }

        if (!data) {
          resultsDiv.innerHTML = `<div class="status-card" style="border-top-color:orange;">No record found for <b>${num}</b>. Check the ID and try again.</div>`;
          return;
        }

        // 3. Build UI
        let logsHtml = data.logs && data.logs.length > 0 
          ? data.logs.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).map(l => `
              <div class="log-item">
                <div class="log-dot"></div>
                <b>${l.status_update}</b><br>
                <small>${l.location} | ${new Date(l.created_at).toLocaleDateString()}</small>
              </div>
            `).join('')
          : '<p>No history yet.</p>';

        resultsDiv.innerHTML = `
          <div class="status-card">
            <h2 style="margin:0;color:#007bff;">${data.tracking_number}</h2>
            <p><b>Current Status:</b> ${data.current_status}</p>
            <p><b>Destination:</b> ${data.destination}</p>
            <hr>
            <h4>Journey History</h4>
            ${logsHtml}
          </div>
        `;
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
      }

      // Force globally
      window.trackShipment = trackShipment;

      // Detect button clicks anywhere on the page
      document.addEventListener('click', (e) => {
        if (e.target.innerText && e.target.innerText.toUpperCase().includes('TRACK')) {
          setTimeout(trackShipment, 100); // Small delay to let React update the input value
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
